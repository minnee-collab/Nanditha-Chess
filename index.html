<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanditha V | Chess Mentor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #070d19; color: #f1f5f9; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        .chess-board { 
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            aspect-ratio: 1; 
            background: #0f172a; 
            border-radius: 1rem; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .square { display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .dark { background-color: rgba(30, 41, 59, 0.5); }
        .light { background-color: rgba(51, 65, 85, 0.2); }
    </style>
</head>
<body>
    <nav class="max-w-7xl mx-auto px-8 h-24 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="bg-rose-500 p-2.5 rounded-2xl text-white shadow-lg">
                <i data-lucide="trophy"></i>
            </div>
            <div>
                <h1 class="text-xl font-black text-white uppercase tracking-tighter">Nanditha V</h1>
                <p class="text-[10px] font-bold text-rose-400 uppercase tracking-widest">FIDE WCM Mentor</p>
            </div>
        </div>
        <div class="hidden md:flex gap-8 text-[10px] font-black uppercase tracking-widest text-slate-500">
            <a href="#" class="text-rose-500">Home</a>
            <a href="#" class="hover:text-white transition-colors">About</a>
            <a href="#" class="hover:text-white transition-colors">Contact</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-8 py-20">
        <div class="grid lg:grid-cols-2 gap-20 items-center">
            <div class="space-y-10">
                <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-white/10 text-rose-400 text-[10px] font-black uppercase tracking-widest">
                    <span class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></span>
                    Now accepting new students
                </div>
                <h1 class="text-7xl md:text-8xl font-black text-white leading-[0.9] tracking-tighter">
                    Elevate Your <br/>
                    <span class="text-rose-500">Chess IQ.</span>
                </h1>
                <p class="text-xl text-slate-400 font-medium max-w-md leading-relaxed">
                    Professional mentorship and strategic depth with a Woman Candidate Master.
                </p>
                <div class="flex flex-wrap gap-4">
                    <a href="mailto:your-email@example.com" class="inline-flex px-10 py-5 bg-rose-500 text-white rounded-2xl font-black items-center gap-3 hover:bg-rose-400 transition-all shadow-xl shadow-rose-500/20">
                        Start Training 
                        <i data-lucide="arrow-right"></i>
                    </a>
                </div>
            </div>

            <div class="relative">
                <div class="absolute -inset-10 bg-rose-500/10 blur-[100px] rounded-full"></div>
                <div id="board" class="relative chess-board shadow-2xl">
                    </div>
            </div>
        </div>
    </main>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Generate Chess Board
        const boardContainer = document.getElementById('board');
        for (let i = 0; i < 64; i++) {
            const row = Math.floor(i / 8);
            const isDark = (row + i) % 2 === 1;
            const square = document.createElement('div');
            square.className = `square ${isDark ? 'dark' : 'light'}`;
            
            // Add some demo pieces
            if (i === 28) square.innerHTML = '<span style="color:white; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3))">♔</span>';
            if (i === 20) square.innerHTML = '<span style="color:#f43f5e; filter: drop-shadow(0 0 10px rgba(244,63,94,0.3))">♚</span>';
            
            boardContainer.appendChild(square);
        }
    </script>
</body>
</html>
