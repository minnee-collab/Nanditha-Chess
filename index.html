<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanditha V | Chess Mentor</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #070d19; margin: 0; }
        #debug-log { color: #f87171; font-family: monospace; padding: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <div id="debug-log"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            try {
                // Check for Lucide
                const lucideLib = window.lucide || window.Lucide;
                if (!lucideLib) {
                    return <div className="min-h-screen flex items-center justify-center text-rose-400 font-bold">Connecting to Icon Library...</div>;
                }

                const { Trophy, User, GraduationCap, BookOpen, MessageSquare, ArrowRight } = lucideLib;
                const [activeTab, setActiveTab] = useState('home');

                return (
                    <div className="min-h-screen text-slate-200 p-8">
                        <nav className="flex justify-between items-center mb-12">
                            <div className="flex items-center gap-3">
                                <div className="bg-rose-500 p-2 rounded-xl text-white"><Trophy size={24} /></div>
                                <h1 className="text-xl font-black text-white uppercase">Nanditha V</h1>
                            </div>
                            <div className="flex gap-4">
                                {['home', 'about', 'contact'].map(t => (
                                    <button key={t} onClick={() => setActiveTab(t)} className={`capitalize ${activeTab === t ? 'text-rose-500' : ''}`}>{t}</button>
                                ))}
                            </div>
                        </nav>

                        {activeTab === 'home' ? (
                            <div className="max-w-4xl mx-auto text-center space-y-8 mt-20">
                                <h1 className="text-6xl font-black text-white">Elevate Your <span className="text-rose-500">Chess IQ.</span></h1>
                                <p className="text-xl text-slate-400">Professional mentorship from a Woman Candidate Master.</p>
                                <button className="mx-auto px-8 py-4 bg-rose-500 text-white rounded-2xl font-black flex items-center gap-2">Start Training <ArrowRight size={20} /></button>
                            </div>
                        ) : (
                            <div className="text-center mt-20 text-slate-500 italic">Content coming soon...</div>
                        )}
                    </div>
                );
            } catch (error) {
                document.getElementById('debug-log').innerText = "React Error: " + error.message;
                return null;
            }
        };

        // Final Mount
        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
            console.log("App rendered successfully");
        } catch (e) {
            document.getElementById('debug-log').innerText = "Mount Error: " + e.message;
        }
    </script>
</body>
</html>
