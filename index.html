<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanditha V | Chess Mentor</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #070d19; margin: 0; overflow-x: hidden; }
        #debug-log { color: #f87171; font-family: monospace; padding: 20px; font-size: 12px; position: fixed; bottom: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <div id="debug-log"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            // 1. All "Hooks" must stay at the very top
            const [activeTab, setActiveTab] = useState('home');
            const [ready, setReady] = useState(false);

            // 2. Wait for everything to load before showing the site
            useEffect(() => {
                const timer = setInterval(() => {
                    if (window.lucide || window.Lucide) {
                        setReady(true);
                        clearInterval(timer);
                    }
                }, 100);
                return () => clearInterval(timer);
            }, []);

            if (!ready) {
                return (
                    <div className="min-h-screen bg-[#070d19] flex items-center justify-center">
                        <div className="text-rose-500 font-bold animate-pulse uppercase tracking-widest">Loading Dashboard...</div>
                    </div>
                );
            }

            // 3. Setup Icons
            const lib = window.lucide || window.Lucide;
            const { Trophy, ArrowRight, User, Mail } = lib;

            return (
                <div className="min-h-screen bg-[#070d19] text-slate-200 font-sans selection:bg-rose-500/30">
                    <nav className="max-w-7xl mx-auto px-8 h-24 flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <div className="bg-rose-500 p-2.5 rounded-2xl text-white shadow-lg shadow-rose-500/20">
                                <Trophy size={24} />
                            </div>
                            <div>
                                <h1 className="text-xl font-black text-white uppercase tracking-tighter">Nanditha V</h1>
                                <p className="text-[10px] font-bold text-rose-400 uppercase tracking-widest">FIDE WCM Mentor</p>
                            </div>
                        </div>
                        <div className="hidden md:flex gap-8">
                            {['home', 'about', 'contact'].map(item => (
                                <button 
                                    key={item} 
                                    onClick={() => setActiveTab(item)}
                                    className={`text-xs font-black uppercase tracking-widest transition-all ${activeTab === item ? 'text-rose-500' : 'text-slate-500 hover:text-white'}`}
                                >
                                    {item}
                                </button>
                            ))}
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-8 pt-20">
                        {activeTab === 'home' ? (
                            <div className="grid lg:grid-cols-2 gap-20 items-center">
                                <div className="space-y-10">
                                    <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-white/10 text-rose-400 text-[10px] font-black uppercase tracking-widest">
                                        <span className="w-1.5 h-1.5 rounded-full bg-rose-500 animate-ping" />
                                        Now accepting new students
                                    </div>
                                    <h1 className="text-8xl font-black text-white leading-[0.9] tracking-tighter">
                                        Elevate Your <br/>
                                        <span className="text-rose-500">Chess IQ.</span>
                                    </h1>
                                    <p className="text-xl text-slate-400 font-medium max-w-md leading-relaxed">
                                        Professional mentorship and strategic depth with a Woman Candidate Master.
                                    </p>
                                    <button className="group px-10 py-5 bg-rose-500 text-white rounded-2xl font-black flex items-center gap-3 hover:bg-rose-400 transition-all transform hover:-translate-y-1 shadow-2xl shadow-rose-500/20">
                                        Start Training 
                                        <ArrowRight size={20} className="group-hover:translate-x-1 transition-transform" />
                                    </button>
                                </div>

                                <div className="relative">
                                    <div className="absolute -inset-10 bg-rose-500/10 blur-[120px] rounded-full" />
                                    <div className="relative bg-slate-900/50 border border-white/10 rounded-[3rem] p-8 backdrop-blur-3xl">
                                        <div className="grid grid-cols-8 aspect-square bg-slate-950 rounded-2xl overflow-hidden ring-1 ring-white/10">
                                            {Array.from({length: 64}).map((_, i) => (
                                                <div key={i} className={`flex items-center justify-center text-4xl ${(Math.floor(i/8) + i%8) % 2 ? 'bg-slate-900/50' : 'bg-slate-800/20'}`}>
                                                    {i === 28 && <span className="text-white drop-shadow-md">♔</span>}
                                                    {i === 20 && <span className="text-rose-500 drop-shadow-md">♚</span>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="py-40 text-center animate-pulse">
                                <h2 className="text-5xl font-black text-white uppercase mb-4">{activeTab}</h2>
                                <p className="text-slate-500 font-bold tracking-widest uppercase">System update in progress...</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
