<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanditha V | Chess Mentor</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { background-color: #070d19; margin: 0; overflow-x: hidden; }
        /* Hide the default cursor for the custom heart effect */
        .custom-cursor-area { cursor: none !important; }
        .custom-cursor-area a, .custom-cursor-area button { cursor: none !important; }
    </style>
</head>
<body class="custom-cursor-area">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Map Lucide icons from the global window object
        const { 
            User, BookOpen, GraduationCap, MessageSquare, 
            Award, Star, Trophy, ArrowRight, CheckCircle2, 
            ChevronRight, Menu, X 
        } = window.lucide;

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [puzzleSolved, setPuzzleSolved] = useState(false);
            const [puzzleError, setPuzzleError] = useState(false);
            
            const [isHovering, setIsHovering] = useState(false);
            const [cursorColor, setCursorColor] = useState('rgba(244, 63, 94, 0.6)');

            const dotRef = useRef(null);
            const heartRef = useRef(null);
            const canvasRef = useRef(null);
            const mousePos = useRef({ x: 0, y: 0 });
            const heartPos = useRef({ x: 0, y: 0 });
            const particles = useRef([]);

            // Particle System & Cursor Loop
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                
                const resizeCanvas = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                
                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();

                const handleMouseMove = (e) => {
                    mousePos.current = { x: e.clientX, y: e.clientY };
                    if (dotRef.current) {
                        dotRef.current.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
                    }
                };

                const handleMouseDown = (e) => {
                    const colors = ['#f43f5e', '#fb7185', '#fda4af', '#9f1239', '#ffffff'];
                    for (let i = 0; i < 12; i++) {
                        particles.current.push({
                            x: e.clientX,
                            y: e.clientY,
                            vx: (Math.random() - 0.5) * 8,
                            vy: (Math.random() - 0.5) * 8,
                            radius: Math.random() * 4 + 2,
                            color: colors[Math.floor(Math.random() * colors.length)],
                            alpha: 1,
                            life: 1
                        });
                    }
                };

                let rafId;
                const render = () => {
                    heartPos.current.x += (mousePos.current.x - heartPos.current.x) * 0.4;
                    heartPos.current.y += (mousePos.current.y - heartPos.current.y) * 0.4;

                    if (heartRef.current) {
                        heartRef.current.style.transform = `translate3d(${heartPos.current.x}px, ${heartPos.current.y}px, 0) translate(-50%, -50%) ${isHovering ? 'scale(1.2)' : 'scale(1)'}`;
                    }

                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    for (let i = particles.current.length - 1; i >= 0; i--) {
                        const p = particles.current[i];
                        p.x += p.vx;
                        p.y += p.vy;
                        p.alpha -= 0.02;
                        p.radius *= 0.96;
                        p.life -= 0.02;

                        if (p.alpha <= 0 || p.radius < 0.5) {
                            particles.current.splice(i, 1);
                            continue;
                        }

                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = p.alpha;
                        ctx.fill();
                    }
                    rafId = requestAnimationFrame(render);
                };

                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('mousedown', handleMouseDown);
                rafId = requestAnimationFrame(render);

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
