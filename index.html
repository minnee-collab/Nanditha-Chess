<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanditha V | FIDE WCM Mentor</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
          // Robust check for Lucide icons (handles both 'lucide' and 'Lucide' naming)
          const lucideLib = window.lucide || window.Lucide;
          
          if (!lucideLib) {
            console.log("Waiting for Lucide icons to load...");
            return <div className="min-h-screen bg-[#070d19] flex items-center justify-center text-white">Loading Icons...</div>;
          }

          const { 
              User, BookOpen, GraduationCap, MessageSquare, Award, 
              Star, Trophy, ArrowRight, CheckCircle2, ChevronRight, Menu, X 
          } = lucideLib;

          const [activeTab, setActiveTab] = useState('home');
          const [isHovering, setIsHovering] = useState(false);
          const [cursorColor, setCursorColor] = useState('rgba(244, 63, 94, 0.6)');
          const [puzzleSolved, setPuzzleSolved] = useState(false);

          const dotRef = useRef(null);
          const heartRef = useRef(null);
          const canvasRef = useRef(null);
          const mousePos = useRef({ x: 0, y: 0 });
          const heartPos = useRef({ x: 0, y: 0 });
          const particles = useRef([]);

          useEffect(() => {
            console.log("Dashboard Initialized Successfully!");
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
            window.addEventListener('resize', resize);
            resize();

            const render = () => {
              heartPos.current.x += (mousePos.current.x - heartPos.current.x) * 0.4;
              heartPos.current.y += (mousePos.current.y - heartPos.current.y) * 0.4;
              if (heartRef.current) {
                heartRef.current.style.transform = `translate3d(${heartPos.current.x}px, ${heartPos.current.y}px, 0) translate(-50%, -50%) ${isHovering ? 'scale(1.2)' : 'scale(1)'}`;
              }
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              for (let i = particles.current.length - 1; i >= 0; i--) {
                const p = particles.current[i];
                p.x += (p.vx || 0); p.y += (p.vy || 0); p.alpha = (p.alpha || 1) - 0.02;
                if (p.alpha <= 0) { particles.current.splice(i, 1); continue; }
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = '#f43f5e'; ctx.globalAlpha = p.alpha; ctx.fill();
              }
              requestAnimationFrame(render);
            };
            
            const handleMove = (e) => {
              mousePos.current = { x: e.clientX, y: e.clientY };
              if (dotRef.current) dotRef.current.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
            };

            window.addEventListener('mousemove', handleMove);
            const raf = requestAnimationFrame(render);
            return () => { window.removeEventListener('mousemove', handleMove); cancelAnimationFrame(raf); };
          }, [isHovering]);

          const TiltCard = ({ children, className = "", color = "rose" }) => {
            const colors = { rose: 'rgba(244, 63, 94, 0.4)', purple: 'rgba(168, 85, 247, 0.4)', white: 'rgba(255, 255, 255, 0.1)' };
            return (
              <div onMouseEnter={() => { setIsHovering(true); setCursorColor(colors[color]); }} onMouseLeave={() => setIsHovering(false)}
                className={`relative overflow-hidden border border-white/10 bg-slate-900/40 backdrop-blur-md rounded-[2rem] p-8 ${className}`}>
                {children}
              </div>
            );
          };

          return (
            <div className="min-h-screen bg-[#070d19] text-slate-200 cursor-none selection:bg-rose-500/30">
              <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-[9997]" />
              <div ref={dotRef} className="fixed top-0 left-0 w-1.5 h-1.5 bg-rose-400 rounded-full pointer-events-none z-[9999]" />
              <div ref={heartRef} className="fixed top-0 left-0 pointer-events-none z-[9998] flex items-center justify-center transition-all duration-300 ease-out"
                style={{ width: isHovering ? '54px' : '34px', height: isHovering ? '54px' : '34px', backgroundColor: cursorColor, clipPath: 'path("M24 43.3c-1.1 0-2.1-.4-3-1.1L5.6 27.8c-3.1-2.9-4.7-6.9-4.7-11.1C.9 8.2 7.7 1.5 16.2 1.5c4.1 0 7.9 1.6 10.8 4.6 2.9-3 6.7-4.6 10.8-4.6 8.5 0 15.3 6.7 15.3 15.2 0 4.2-1.6 8.2-4.7 11.1L33 42.2c-.9.7-1.9 1.1-3 1.1z")' }} />

              <nav className="sticky top-0 z-50 border-b border-white/5 bg-[#070d19]/60 backdrop-blur-xl h-20 flex items-center justify-between px-8">
                <div className="flex items-center gap-3">
                  <div className="bg-rose-500 p-2 rounded-xl text-white"><Trophy size={24} /></div>
                  <div><h1 className="text-lg font-black text-white uppercase tracking-tighter">Nanditha V</h1><p className="text-[10px] font-bold text-rose-400 uppercase tracking-widest">FIDE WCM Mentor</p></div>
                </div>
                <div className="hidden md:flex gap-4">
                  {['home', 'about', 'classroom', 'courses', 'contact'].map(tab => (
                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 rounded-full text-xs font-bold uppercase transition-all ${activeTab === tab ? 'bg-white/10 text-rose-400' : 'text-slate-400 hover:text-white'}`}>{tab}</button>
                  ))}
                </div>
              </nav>

              <main className="max-w-7xl mx-auto px-8 py-12">
                {activeTab === 'home' ? (
                  <div className="grid md:grid-cols-2 gap-16 items-center">
                    <TiltCard color="white" className="border-none bg-transparent">
                      <div className="space-y-8">
                        <div className="inline-block px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-rose-400 text-xs font-bold uppercase">Accepting Students</div>
                        <h1 className="text-7xl font-black text-white leading-none">Elevate Your <span className="text-rose-500">Chess IQ.</span></h1>
                        <p className="text-xl text-slate-400 font-medium">Professional mentorship from a Woman Candidate Master.</p>
                        <button onClick={() => setActiveTab('contact')} className="px-8 py-4 bg-rose-500 text-white rounded-2xl font-black flex items-center gap-2 hover:bg-rose-400 transition-all">Start Training <ArrowRight size={20} /></button>
                      </div>
                    </TiltCard>
                    <div className="bg-slate-900/80 border border-white/10 rounded-[3rem] p-10">
                      <h3 className="text-white font-black text-xl mb-6">Live Training Board</h3>
                      <div className="grid grid-cols-8 aspect-square bg-slate-950 rounded-xl overflow-hidden shadow-2xl">
                        {Array.from({length: 64}).map((_, i) => (
                          <div key={i} className={`flex items-center justify-center text-4xl ${(Math.floor(i/8) + i%8) % 2 ? 'bg-slate-800/50' : 'bg-slate-700/20'}`}>
                            {i === 28 ? <span className="text-white">♔</span> : i === 20 ? <span className="text-black">♚</span> : ''}
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="py-24 text-center">
                    <TiltCard color="purple" className="max-w-xl mx-auto">
                      <h2 className="text-4xl font-black text-white uppercase mb-4">{activeTab}</h2>
                      <p className="text-slate-400 mb-8 text-lg">This module is currently being optimized for your experience.</p>
                      <button onClick={() => setActiveTab('home')} className="px-10 py-4 bg-rose-500 text-white font-black rounded-2xl">Return Home</button>
                    </TiltCard>
                  </div>
                )}
              </main>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
